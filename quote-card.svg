<svg width="560" height="120" viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg">
  <rect x="0.5" y="0.5" width="559" height="119" rx="10" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
